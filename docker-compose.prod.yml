# AgriFetch production stack — Hetzner CAX11 (ARM).
#
# This server already runs a shared Caddy (from the fuel-monitoring stack)
# that owns ports 80/443. AgriFetch therefore runs ONLY its Node frontend,
# joined to the shared `fleettrack` network. The existing Caddy routes
# agrifetch.com → agrifetch-frontend:3000 (see the fuel-monitoring Caddyfile).
#
# Usage:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/your-org/agrifetch-frontend:latest}
    restart: unless-stopped
    environment:
      RESEND_API_KEY: ${RESEND_API_KEY:?set RESEND_API_KEY in .env}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-enquiries@agrifetch.com}
      ENQUIRY_TO_EMAIL: ${ENQUIRY_TO_EMAIL:-info@agrifetch.com}
    expose:
      - "3000"
    networks:
      fleettrack:
        # Stable name for the shared Caddy to reverse_proxy to. Avoids the
        # generic "frontend" alias colliding with fuel-monitoring's own
        # frontend service on the same network.
        aliases:
          - agrifetch-frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  fleettrack:
    external: true   # created by the fuel-monitoring stack
