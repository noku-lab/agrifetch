# AgriFetch production stack — Hetzner CAX11 (ARM).
#
# Caddy is the single edge proxy for the whole server — it handles TLS
# for both agrifetch.com and fleettrak24.com by joining both Docker networks.
#
# Usage:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-admin@agrifetch.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - agrifetch
      - fleettrack
    depends_on:
      - frontend

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/your-org/agrifetch-frontend:latest}
    restart: unless-stopped
    environment:
      RESEND_API_KEY: ${RESEND_API_KEY:?set RESEND_API_KEY in .env}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-enquiries@agrifetch.com}
      ENQUIRY_TO_EMAIL: ${ENQUIRY_TO_EMAIL:-info@agrifetch.com}
    expose:
      - "3000"
    networks:
      - agrifetch
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  agrifetch:
    name: agrifetch
  fleettrack:
    external: true   # managed by the fuel-monitoring stack — must exist before deploying

volumes:
  caddy_data:
  caddy_config:
